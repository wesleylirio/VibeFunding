services:
  vibefunding:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DEMO_MODE: "true"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: file:/app/data/app.db
      # auto|amd|mock — Demo Mode remains offline-safe without keys
      GEMMA_PROVIDER: ${GEMMA_PROVIDER:-auto}
      GEMMA_BASE_URL: ${GEMMA_BASE_URL:-}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-}
      GEMMA_MODEL: ${GEMMA_MODEL:-google/gemma-4-12B-it}
      GEMMA_TIMEOUT_MS: ${GEMMA_TIMEOUT_MS:-30000}
      GEMMA_MAX_OUTPUT_TOKENS: ${GEMMA_MAX_OUTPUT_TOKENS:-2048}
    volumes:
      # Isolated volume — does not touch host ./data developer DB
      - vf-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s

volumes:
  vf-data:
