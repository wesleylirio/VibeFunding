services:
  vibefunding:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DEMO_MODE: "true"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: file:/app/data/app.db
      # Primary: Fireworks (AMD + Gemma). Fallback: OPENROUTER for always-on.
      GEMMA_PROVIDER: ${GEMMA_PROVIDER:-auto}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_BASE_URL: ${FIREWORKS_BASE_URL:-https://api.fireworks.ai/inference/v1}
      FIREWORKS_MODEL: ${FIREWORKS_MODEL:-}
      GEMMA_MODEL: ${GEMMA_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemma-4-31b-it:free}
      GEMMA_TIMEOUT_MS: ${GEMMA_TIMEOUT_MS:-60000}
      GEMMA_MAX_OUTPUT_TOKENS: ${GEMMA_MAX_OUTPUT_TOKENS:-2048}
    volumes:
      - vf-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s

volumes:
  vf-data:
