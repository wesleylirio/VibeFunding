# Render blueprint — public demo for hackathon judges
# Primary: FIREWORKS_* secrets when deployment/credits available
# Fallback: OPENROUTER_API_KEY for always-on free Gemma
services:
  - type: web
    name: vibefunding
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: GEMMA_PROVIDER
        value: auto
      - key: DATABASE_URL
        value: file:/app/data/app.db
      - key: FIREWORKS_API_KEY
        sync: false
      - key: FIREWORKS_BASE_URL
        value: https://api.fireworks.ai/inference/v1
      - key: FIREWORKS_MODEL
        sync: false
      - key: GEMMA_MODEL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: google/gemma-4-31b-it:free
